# ─────────────────────────────────────────────────────────────────────────────
# Deploy — AI for EveryOne (Combined Workshop + Products)
#
# Triggers on every push to main (and can be run manually).
# Injects GitHub secrets → config.js → deploys to GitHub Pages.
#
# Required repository secrets:
#   GOOGLE_SHEET_URL   — Workshop Apps Script Web App URL
#   RAZORPAY_KEY_ID    — Razorpay publishable key
#   CSV_GITHUB_TOKEN   — Fine-grained PAT (Contents R+W on this repo)
#   LEADS_SHEET_URL    — Product leads Apps Script Web App URL
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from repository secrets
        env:
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          RAZORPAY_KEY_ID:  ${{ secrets.RAZORPAY_KEY_ID }}
          CSV_GITHUB_TOKEN: ${{ secrets.CSV_GITHUB_TOKEN }}
          LEADS_SHEET_URL:  ${{ secrets.LEADS_SHEET_URL }}
        run: |
          python3 - <<'PY'
          import os, json

          cfg = {
              "GOOGLE_SHEET_URL": os.environ.get("GOOGLE_SHEET_URL", ""),
              "RAZORPAY_KEY_ID":  os.environ.get("RAZORPAY_KEY_ID",  ""),
              "GITHUB_TOKEN":     os.environ.get("CSV_GITHUB_TOKEN", ""),
              "GITHUB_REPO":      "karnkeshav/aiproducts",
              "LEADS_SHEET_URL":  os.environ.get("LEADS_SHEET_URL",  ""),
          }

          content  = "/* Auto-generated by GitHub Actions — do not edit */\n"
          content += "window.APP_CONFIG = " + json.dumps(cfg, indent=2) + ";\n"

          with open("config.js", "w") as f:
              f.write(content)

          print("config.js written successfully")
          PY

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp index.html        dist/
          cp app.js            dist/
          cp config.js         dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
